name: Build Sync Guardian for Windows

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths-ignore:
      - "**/*.md"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Check out Sync Guardian
        uses: actions/checkout@v4

      - name: Download official OBS plugin build infrastructure
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest `
            -Uri 'https://github.com/obsproject/obs-plugintemplate/archive/refs/heads/master.zip' `
            -OutFile "$env:RUNNER_TEMP\obs-plugintemplate.zip"
          Expand-Archive `
            -Path "$env:RUNNER_TEMP\obs-plugintemplate.zip" `
            -DestinationPath "$env:RUNNER_TEMP\obs-plugintemplate"
          $template = Join-Path $env:RUNNER_TEMP 'obs-plugintemplate\obs-plugintemplate-master'
          Copy-Item -Recurse -Force "$template\build-aux" "$env:GITHUB_WORKSPACE\build-aux"
          Copy-Item -Recurse -Force "$template\cmake" "$env:GITHUB_WORKSPACE\cmake"
          Copy-Item -Force "$template\CMakePresets.json" "$env:GITHUB_WORKSPACE\CMakePresets.json"

          $presetsPath = "$env:GITHUB_WORKSPACE\CMakePresets.json"
          $presets = Get-Content -Raw $presetsPath | ConvertFrom-Json
          $templatePreset = $presets.configurePresets | Where-Object { $_.name -eq 'template' }
          if ($null -eq $templatePreset) { throw 'Could not find the template configure preset.' }
          $templatePreset.cacheVariables.ENABLE_FRONTEND_API = $true
          $templatePreset.cacheVariables.ENABLE_QT = $true
          $presets | ConvertTo-Json -Depth 100 | Set-Content -Encoding utf8 $presetsPath
          New-Item -ItemType Directory -Force "$env:GITHUB_WORKSPACE\.github\scripts" | Out-Null
          Copy-Item -Recurse -Force "$template\.github\scripts\*" "$env:GITHUB_WORKSPACE\.github\scripts"

      - name: Build Windows x64 DLL
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          .github/scripts/Build-Windows.ps1 -Target x64 -Configuration RelWithDebInfo

      - name: Create drag-and-drop OBS package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $packageRoot = Join-Path $env:GITHUB_WORKSPACE 'obs-install'
          $distRoot = Join-Path $env:GITHUB_WORKSPACE 'dist'
          Remove-Item -Recurse -Force $packageRoot -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force $distRoot -ErrorAction SilentlyContinue

          $pluginDir = Join-Path $packageRoot 'obs-plugins\64bit'
          $localeDir = Join-Path $packageRoot 'data\obs-plugins\sync-guardian\locale'
          New-Item -ItemType Directory -Force $pluginDir | Out-Null
          New-Item -ItemType Directory -Force $localeDir | Out-Null
          New-Item -ItemType Directory -Force $distRoot | Out-Null

          $dll = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -File -Filter 'sync-guardian.dll' |
            Where-Object { $_.FullName -notmatch '\.deps\' -and $_.FullName -notmatch '\obs-install\' -and $_.FullName -notmatch '\dist\' } |
            Sort-Object @{ Expression = { if ($_.FullName -match 'RelWithDebInfo|Release') { 0 } else { 1 } } }, FullName |
            Select-Object -First 1
          if ($null -eq $dll) { throw 'Could not locate the compiled sync-guardian.dll.' }

          Copy-Item -Force $dll.FullName (Join-Path $pluginDir 'sync-guardian.dll')
          Copy-Item -Force "$env:GITHUB_WORKSPACE\data\locale\en-US.ini" (Join-Path $localeDir 'en-US.ini')

          @'
          INSTALL SYNC GUARDIAN

          Setup EXE: run SyncGuardian-Setup.exe and follow the prompts.

          Manual install:
          1. Close OBS completely.
          2. Drag the included "obs-plugins" and "data" folders into:
             C:\Program Files\obs-studio\
          3. Allow Windows to merge the folders.
          4. Start OBS and open Docks > Sync Guardian.

          Install this on the receiving/streaming PC.
          '@ | Set-Content -Encoding utf8 (Join-Path $packageRoot 'INSTALL.txt')

          Compress-Archive -Path (Join-Path $packageRoot '*') -DestinationPath (Join-Path $distRoot 'SyncGuardian-Portable.zip') -Force

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build Setup EXE
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $iscc = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          if (-not (Test-Path $iscc)) { throw 'Inno Setup compiler not found.' }
          & $iscc "/DMyAppVersion=0.3.0" "/DSourceRoot=$env:GITHUB_WORKSPACE\obs-install" "/DOutputRoot=$env:GITHUB_WORKSPACE\dist" "$env:GITHUB_WORKSPACE\installer\SyncGuardian.iss"

      - name: Generate checksums
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Get-ChildItem "$env:GITHUB_WORKSPACE\dist" -File | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash *$($_.Name)"
          } | Set-Content -Encoding ascii "$env:GITHUB_WORKSPACE\dist\SHA256SUMS.txt"

      - name: Upload install-ready plugin
        uses: actions/upload-artifact@v4
        with:
          name: sync-guardian-0.3.0-windows-x64
          path: dist/
          if-no-files-found: error
          retention-days: 30
